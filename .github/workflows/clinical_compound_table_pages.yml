name: clinical-compound-table-pages

on:
  workflow_dispatch:
    inputs:
      table_mode:
        description: "HTML table mode"
        required: false
        default: "tabulator"
  workflow_run:
    workflows: ["collect-clinical-trials-full", "collect-clinical-trials-incremental"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: clinical-compound-table-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Prepare dataset from latest snapshot
        run: |
          set -euo pipefail
          mkdir -p out/pubchem_trials_dataset_gh
          cp snapshots/clinical_trials/latest/trials.json out/pubchem_trials_dataset_gh/trials.json
          if [ -f snapshots/clinical_trials/latest/compounds.json ]; then
            cp snapshots/clinical_trials/latest/compounds.json out/pubchem_trials_dataset_gh/compounds.json
          fi
          if [ -f snapshots/clinical_trials/latest/trials_compact.json ]; then
            cp snapshots/clinical_trials/latest/trials_compact.json out/pubchem_trials_dataset_gh/trials_compact.json
          fi

          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          out_dir = Path("out/pubchem_trials_dataset_gh")
          trials_path = out_dir / "trials.json"
          compounds_path = out_dir / "compounds.json"
          compact_path = out_dir / "trials_compact.json"
          rows = json.loads(trials_path.read_text(encoding="utf-8"))
          if not isinstance(rows, list):
              rows = [rows]

          keys = set()
          cids = set()
          for r in rows:
              if isinstance(r, dict):
                  keys.update(r.keys())
                  cid = r.get("cid")
                  if isinstance(cid, int):
                      cids.add(cid)

          preferred = [
              "cid",
              "collection",
              "id",
              "id_url",
              "title",
              "phase",
              "status",
              "date",
              "smiles",
              "inchikey",
              "iupac_name",
              "image_base64",
              "compound_error",
          ]
          header = [k for k in preferred if k in keys] + sorted(k for k in keys if k not in preferred)

          with (out_dir / "trials.csv").open("w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=header)
              w.writeheader()
              for r in rows:
                  if isinstance(r, dict):
                      w.writerow({k: r.get(k) for k in header})

          (out_dir / "cids.txt").write_text(
              "\n".join(str(x) for x in sorted(cids)) + ("\n" if cids else ""),
              encoding="utf-8",
          )

          n_compounds = 0
          if compounds_path.exists():
              compounds = json.loads(compounds_path.read_text(encoding="utf-8"))
              if isinstance(compounds, list):
                  n_compounds = len(compounds)
              elif isinstance(compounds, dict):
                  n_compounds = 1

          summary = {
              "source_trials": "snapshots/clinical_trials/latest/trials.json",
              "source_compounds": "snapshots/clinical_trials/latest/compounds.json" if compounds_path.exists() else None,
              "source_trials_compact": "snapshots/clinical_trials/latest/trials_compact.json" if compact_path.exists() else None,
              "n_rows": len(rows),
              "n_cids": len(cids),
              "n_compounds": n_compounds,
              "csv": str(out_dir / "trials.csv"),
              "json": str(trials_path),
              "compounds_json": str(compounds_path) if compounds_path.exists() else None,
              "trials_compact_json": str(compact_path) if compact_path.exists() else None,
              "cids": str(out_dir / "cids.txt"),
          }
          (out_dir / "summary.json").write_text(
              json.dumps(summary, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Build table HTML
        env:
          TABLE_MODE: ${{ github.event.inputs.table_mode || 'tabulator' }}
        run: |
          python scripts/build_pubchem_trials_table.py \
            --in-json out/pubchem_trials_dataset_gh/trials.json \
            --mode "${TABLE_MODE}" \
            --out-html out/pubchem_trials_dataset_gh/index.html \
            --title "Clinical Trials Table"

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp out/pubchem_trials_dataset_gh/index.html site/index.html
          cp out/pubchem_trials_dataset_gh/trials.json site/trials.json
          cp out/pubchem_trials_dataset_gh/trials.csv site/trials.csv
          if [ -f out/pubchem_trials_dataset_gh/compounds.json ]; then
            cp out/pubchem_trials_dataset_gh/compounds.json site/compounds.json
          fi
          if [ -f out/pubchem_trials_dataset_gh/trials_compact.json ]; then
            cp out/pubchem_trials_dataset_gh/trials_compact.json site/trials_compact.json
          fi
          cp out/pubchem_trials_dataset_gh/summary.json site/summary.json
          cp out/pubchem_trials_dataset_gh/cids.txt site/cids.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
