name: collect-clinical-trials-full

on:
  workflow_dispatch:
    inputs:
      hnid:
        description: "PubChem HNID"
        required: false
        default: "1856916"
      extra_hnids:
        description: "Comma-separated extra HNIDs"
        required: false
        default: ""
      limit_cids:
        description: "Limit CIDs for this run (empty = all)"
        required: false
        default: ""
      limit_per_collection:
        description: "Max rows per collection per CID"
        required: false
        default: "1000"
      image_size:
        description: "PNG size for base64 images"
        required: false
        default: "400x400"
      skip_images:
        description: "Skip PNG base64 image fetch (recommended)"
        required: false
        default: "true"
      shard_size:
        description: "CID shard size (0 = disable shard mode)"
        required: false
        default: "500"
      retention_days:
        description: "Delete history snapshots older than N days"
        required: false
        default: "180"
  schedule:
    - cron: "0 4 1 * *"

permissions:
  contents: write

concurrency:
  group: collect-clinical-trials-full
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build full dataset
        env:
          HNID: ${{ github.event.inputs.hnid || '1856916' }}
          EXTRA_HNIDS: ${{ github.event.inputs.extra_hnids || '' }}
          LIMIT_CIDS: ${{ github.event.inputs.limit_cids || '' }}
          LIMIT_PER_COLLECTION: ${{ github.event.inputs.limit_per_collection || '1000' }}
          IMAGE_SIZE: ${{ github.event.inputs.image_size || '400x400' }}
          SKIP_IMAGES: ${{ github.event.inputs.skip_images || 'true' }}
          SHARD_SIZE: ${{ github.event.inputs.shard_size || '500' }}
        run: |
          set -euo pipefail
          mkdir -p out/pubchem_trials_dataset_gh
          CIDS_FILE="out/pubchem_trials_dataset_gh/cids_all.txt"
          FALLBACK_CIDS_FILE="snapshots/clinical_trials/latest/cids.txt"
          EXTRA_ARGS=""
          if [ -n "${EXTRA_HNIDS}" ]; then
            EXTRA_ARGS="--extra-hnids ${EXTRA_HNIDS}"
          fi
          SKIP_IMAGES_NORMALIZED="$(echo "${SKIP_IMAGES}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_ARGS="--image-size ${IMAGE_SIZE}"
          if [ "${SKIP_IMAGES_NORMALIZED}" = "true" ] || [ "${SKIP_IMAGES_NORMALIZED}" = "1" ] || [ "${SKIP_IMAGES_NORMALIZED}" = "yes" ]; then
            IMAGE_ARGS="--skip-images"
          fi
          echo "[workflow] image fetch mode: ${IMAGE_ARGS}"

          # Prefetch CID universe once to avoid repeated HNID->CID API calls per shard.
          # If PubChem classification is temporarily unavailable, fallback to the last successful CID list.
          python scripts/prefetch_hnid_cids.py \
            --hnid "${HNID}" \
            --extra-hnids "${EXTRA_HNIDS}" \
            --out-file "${CIDS_FILE}" \
            --fallback-file "${FALLBACK_CIDS_FILE}" \
            --update-fallback

          SHARD_SIZE_INT="${SHARD_SIZE:-0}"
          if [ "${SHARD_SIZE_INT}" -gt 0 ]; then
            echo "[workflow] shard mode enabled: shard_size=${SHARD_SIZE_INT}"
            rm -rf out/pubchem_trials_shards
            mkdir -p out/pubchem_trials_shards

            offset=0
            shard_idx=1
            processed=0
            shard_dirs=""

            while true; do
              current_count="${SHARD_SIZE_INT}"
              if [ -n "${LIMIT_CIDS}" ]; then
                remaining=$((LIMIT_CIDS - processed))
                if [ "${remaining}" -le 0 ]; then
                  break
                fi
                if [ "${remaining}" -lt "${current_count}" ]; then
                  current_count="${remaining}"
                fi
              fi

              shard_dir="out/pubchem_trials_shards/s${shard_idx}"
              mkdir -p "${shard_dir}"
              echo "[workflow] collecting shard=${shard_idx} offset=${offset} count=${current_count}"

              python scripts/export_pubchem_trials_dataset.py \
                --hnid "${HNID}" \
                $EXTRA_ARGS \
                --cids-file "${CIDS_FILE}" \
                --cid-offset "${offset}" \
                --cid-count "${current_count}" \
                --collections clinicaltrials,clinicaltrials_eu,clinicaltrials_jp \
                --limit-per-collection "${LIMIT_PER_COLLECTION}" \
                ${IMAGE_ARGS} \
                --out-dir "${shard_dir}"

              n_cids=$(python -c 'import json, pathlib, sys; p = pathlib.Path(sys.argv[1]) / "summary.json"; d = json.loads(p.read_text(encoding="utf-8")); print(d.get("n_cids", 0))' "${shard_dir}")

              if [ "${n_cids}" -le 0 ]; then
                echo "[workflow] shard ${shard_idx} has no CIDs, stop."
                break
              fi

              if [ -z "${shard_dirs}" ]; then
                shard_dirs="${shard_dir}"
              else
                shard_dirs="${shard_dirs},${shard_dir}"
              fi

              processed=$((processed + current_count))
              offset=$((offset + current_count))
              shard_idx=$((shard_idx + 1))

              if [ "${n_cids}" -lt "${current_count}" ]; then
                echo "[workflow] last shard reached (n_cids=${n_cids} < count=${current_count})."
                break
              fi
            done

            if [ -z "${shard_dirs}" ]; then
              echo "No shard outputs were produced."
              exit 1
            fi

            python scripts/merge_pubchem_trials_shards.py \
              --shard-dirs "${shard_dirs}" \
              --out-dir out/pubchem_trials_dataset_gh
          else
            LIMIT_ARGS=""
            if [ -n "${LIMIT_CIDS}" ]; then
              LIMIT_ARGS="--limit-cids ${LIMIT_CIDS}"
            fi

            python scripts/export_pubchem_trials_dataset.py \
              --hnid "${HNID}" \
              $EXTRA_ARGS \
              --cids-file "${CIDS_FILE}" \
              $LIMIT_ARGS \
              --collections clinicaltrials,clinicaltrials_eu,clinicaltrials_jp \
              --limit-per-collection "${LIMIT_PER_COLLECTION}" \
              ${IMAGE_ARGS} \
              --out-dir out/pubchem_trials_dataset_gh
          fi

      - name: Update snapshots
        env:
          RETENTION_DAYS: ${{ github.event.inputs.retention_days || '180' }}
        run: |
          set -euo pipefail
          python scripts/update_pubchem_trials_history.py \
            --trials-file out/pubchem_trials_dataset_gh/trials.json \
            --compounds-file out/pubchem_trials_dataset_gh/compounds.json \
            --trials-compact-file out/pubchem_trials_dataset_gh/trials_compact.json \
            --state-file snapshots/clinical_trials/collection_state.json \
            --latest-file snapshots/clinical_trials/latest/trials.json \
            --latest-compounds-file snapshots/clinical_trials/latest/compounds.json \
            --latest-trials-compact-file snapshots/clinical_trials/latest/trials_compact.json \
            --history-dir snapshots/clinical_trials/history \
            --retention-days "${RETENTION_DAYS}" \
            --changed-flag-path /tmp/pubchem_trials_changed.txt \
            --snapshot-on-change

      - name: Commit and push snapshots
        run: |
          set -euo pipefail
          CHANGED="false"
          if [ -f /tmp/pubchem_trials_changed.txt ]; then
            CHANGED="$(tr -d '[:space:]' < /tmp/pubchem_trials_changed.txt)"
          fi
          if [ "${CHANGED}" != "true" ]; then
            echo "No dataset content changes. Skip commit/push."
            exit 0
          fi

          if git diff --quiet -- snapshots/clinical_trials; then
            echo "No PubChem snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots/clinical_trials

          COLLECTED_AT=$(python -c 'import json, pathlib; state = json.loads(pathlib.Path("snapshots/clinical_trials/collection_state.json").read_text(encoding="utf-8")); print(state.get("last_collected_at", "unknown"))')

          git commit -m "chore(data): full refresh pubchem trials snapshots (${COLLECTED_AT})"
          TARGET_BRANCH="${GITHUB_REF_NAME:-main}"
          echo "Pushing snapshots to branch: ${TARGET_BRANCH}"
          git push origin HEAD:${TARGET_BRANCH}
