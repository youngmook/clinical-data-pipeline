name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target repository"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload to TestPyPI
        if: ${{ github.event.inputs.repository == 'testpypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          python -m twine upload --verbose --repository-url https://test.pypi.org/legacy/ dist/* || {
            echo "::error::Upload failed. Check token scope/secret and whether this version already exists."
            echo "::notice::For local install from TestPyPI, use --extra-index-url https://pypi.org/simple for dependencies."
            exit 1
          }

      - name: Upload to PyPI
        if: ${{ github.event.inputs.repository == 'pypi' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --verbose dist/* || {
            echo "::error::Upload failed. If file already exists, bump version (PyPI file reuse is not allowed)."
            echo "::notice::Also verify PYPI_API_TOKEN scope and value."
            exit 1
          }
